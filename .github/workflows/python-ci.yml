name: Python CI

on:
  push:
    branches:
      - main
      - master
      - test
      - "codex/**"
  pull_request:

concurrency:
  group: python-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test on Python 3.13
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      APP_NAME: Scorbium Dashboard CI
      APP_VERSION: test
      SERVER_HOST: 127.0.0.1
      SERVER_PORT: "8000"
      WEB_SUPERADMIN_USERNAME: admin
      WEB_SUPERADMIN_PASSWORD: supersecure
      DB_ENGINE: postgresql
      DB_NAME: vpnbot
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      TELEGRAM_BOT_TOKEN: "123456:TESTTOKEN"
      TELEGRAM_ADMIN_IDS: "[123456789]"
      TELEGRAM_TYPE_PROTOCOL: long
      TELEGRAM_WEBHOOK_URL: ""
      TELEGRAM_WEBHOOK_PATH: /webhook/bot
      PASARGUARD_ADMIN_PANEL: https://example.com:8012
      PASARGUARD_API_KEY: test-api-key
      LOG_LEVEL: INFO

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Verify sources compile
        run: uv run python -m compileall app tests

      - name: Run test suite
        run: uv run pytest -q
