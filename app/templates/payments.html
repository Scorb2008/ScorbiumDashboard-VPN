{% extends "base.html" %}
{% block title %}Платежи — VPN Panel{% endblock %}
{% block page_title %}Платежи{% endblock %}

{% block content %}
<div class="card">
  <div class="card-header d-flex align-items-center justify-content-between px-3 py-2">
    <span><i class="bi bi-credit-card me-2 text-muted"></i>История платежей</span>
    <div class="d-flex gap-2">
      <div class="dropdown">
        <button class="btn btn-sm btn-outline dropdown-toggle" type="button" data-bs-toggle="dropdown">
          <i class="bi bi-download me-1"></i>Экспорт
        </button>
        <ul class="dropdown-menu dropdown-menu-dark" style="background:var(--bg-elevated);border-color:var(--border)">
          <li><a class="dropdown-item" href="/panel/export/payments?format=csv" style="color:var(--text)">CSV</a></li>
          <li><a class="dropdown-item" href="/panel/export/payments?format=xlsx" style="color:var(--text)">Excel</a></li>
        </ul>
      </div>
      <select class="form-select form-select-sm" style="width:140px"
        hx-get="/panel/payments" hx-target="#payments-tbody" hx-include="#payments-filters" name="status">
        <option value="" {% if current_status == '' %}selected{% endif %}>Все статусы</option>
        <option value="succeeded" {% if current_status == 'succeeded' %}selected{% endif %}>Успешные</option>
        <option value="pending" {% if current_status == 'pending' %}selected{% endif %}>Ожидание</option>
        <option value="failed" {% if current_status == 'failed' %}selected{% endif %}>Ошибка</option>
        <option value="refunded" {% if current_status == 'refunded' %}selected{% endif %}>Возврат</option>
      </select>
    </div>
  </div>
  <div id="payments-filters" hidden>
    <input type="hidden" name="payment_type" value="{{ current_type }}">
  </div>
  <div class="table-responsive">
    <table class="table mb-0">
      <thead>
        <tr>
          <th>#</th><th>Пользователь</th><th>Провайдер</th>
          <th>Сумма</th><th>Статус</th><th>Дата</th><th></th>
        </tr>
      </thead>
      <tbody id="payments-tbody">
        {% include "partials/payments_table_rows.html" %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
