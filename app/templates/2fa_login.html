<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2FA — {{ app_name }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      margin:0;
      padding:1rem;
      background:#0b1424;
      position:relative;
      overflow:hidden;
    }
    body::before {
      content:'';
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at 12% 18%, rgba(0, 212, 170, 0.16), transparent 24%),
        radial-gradient(circle at 86% 16%, rgba(14, 165, 233, 0.15), transparent 26%),
        radial-gradient(circle at 50% 92%, rgba(245, 158, 11, 0.08), transparent 24%);
      z-index:0;
      animation: glowDrift 18s ease-in-out infinite;
    }
    body::after {
      content:'';
      position:fixed;
      inset:0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.22) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.22) 1px, transparent 1px);
      background-size: 72px 72px, 72px 72px;
      background-position: 0 0, 0 0;
      opacity:.4;
      z-index:0;
      animation: blueprintGridDrift 26s linear infinite;
    }
    .auth-card {
      position:relative;
      z-index:1;
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02)),
        rgba(16, 25, 42, 0.88);
      border:1px solid rgba(170, 206, 255, .12);
      border-radius:24px;
      padding:2.5rem;
      width:100%;
      max-width:420px;
      box-shadow:0 18px 48px rgba(0,0,0,.38), inset 0 1px 0 rgba(255,255,255,.05);
      animation: fadeIn .4s ease;
      overflow:hidden;
      backdrop-filter: blur(16px);
    }
    .auth-card::before,
    .auth-card::after { content:none; }
    .auth-card > * { position:relative; z-index:1; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes glowDrift {
      0%, 100% { transform: scale(1); opacity: .88; }
      50% { transform: scale(1.04); opacity: 1; }
    }
    @keyframes blueprintGridDrift {
      0% { background-position: 0 0, 0 0; }
      100% { background-position: 72px 36px, 72px 36px; }
    }
    .auth-title { color:#fff; font-size:1.3rem; font-weight:700; margin-bottom:.3rem; }
    .auth-subtitle { color:#6b7280; font-size:.85rem; margin-bottom:1.5rem; }
    .logo-avatar {
      width:80px; height:80px; border-radius:20px;
      object-fit:contain; object-position:center; padding:10px;
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.1);
      box-shadow:0 8px 32px rgba(0,0,0,.15), inset 0 1px 0 rgba(255,255,255,.08);
      transition: transform .3s ease;
    }
    .logo-avatar:hover { transform:scale(1.05); }
    .logo-fallback {
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-size:1.7rem;
      background:linear-gradient(135deg, #00d4aa, #0ea5e9);
      padding:0;
    }
    .code-input { font-size:1.5rem; letter-spacing:6px; text-align:center; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.1); border-radius:12px; color:#fff; padding:.8rem; }
    .code-input:focus { border-color:#00d4aa; box-shadow:0 0 0 3px rgba(0,212,170,.15); outline:none; }
    .btn-2fa { background:#00d4aa; color:#000; font-weight:600; border:none; border-radius:12px; padding:.7rem; transition: transform .2s ease, background .2s ease; }
    .btn-2fa:hover { background:#00b894; transform:translateY(-1px); }
    .btn-2fa:active { transform:scale(.98); }
    .error-msg { color:#ef4444; font-size:.85rem; margin-top:.5rem; }
    @media (max-width: 640px) {
      .auth-card { padding: 1.5rem; border-radius: 20px; }
      body::after { background-size: 56px 56px, 56px 56px; opacity: .34; }
    }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="text-center mb-4">
      {% if custom_logo %}
      <img src="{{ custom_logo }}" alt="Logo" class="logo-avatar mb-3" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="logo-avatar logo-fallback mb-3" style="display:none">
        <i class="bi bi-shield-lock-fill"></i>
      </div>
      {% else %}
      <div class="logo-avatar logo-fallback mb-3">
        <i class="bi bi-shield-lock-fill"></i>
      </div>
      {% endif %}
      <div class="auth-title">Двухфакторная аутентификация</div>
      <div class="auth-subtitle">Введите 6-значный код из приложения</div>
    </div>
    {% if error %}
    <div class="error-msg text-center mb-3"><i class="bi bi-x-circle me-1"></i>{{ error }}</div>
    {% endif %}
    <form method="POST" action="{{ panel_base }}/2fa-login">
      <input type="text" name="code" class="form-control code-input mb-3" maxlength="6" placeholder="000000" inputmode="numeric" pattern="[0-9]*" autofocus required />
      <button type="submit" class="btn btn-2fa w-100"><i class="bi bi-unlock me-1"></i>Войти</button>
    </form>
    <div class="text-center mt-3">
      <a href="{{ panel_base }}/logout" class="text-decoration-none" style="color:#6b7280;font-size:.8rem">← Вернуться к входу</a>
    </div>
  </div>
  <script>
    document.querySelector('input[name="code"]').addEventListener('input', function(e) {
      if (this.value.length === 6) this.form.submit();
    });
  </script>
</body>
</html>
